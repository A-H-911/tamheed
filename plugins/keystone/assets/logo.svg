<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 96" width="320" height="96" role="img" aria-label="Keystone">
  <title>Keystone</title>
  <desc>The Keystone logo: an amber keystone block at the crown of a slate arch, beside the wordmark Keystone.</desc>
  <!-- Mark, scaled and positioned in a 96x96 box on the left -->
  <g transform="translate(16 16) scale(1.0)">
    <!-- Springing stones -->
    <g fill="#2B3A67">
      <path d="M9 30 L24 22 L24 33 L9 44 Z"/>
      <path d="M55 30 L40 22 L40 33 L55 44 Z"/>
    </g>
    <!-- Keystone wedge -->
    <path d="M24 22 L40 22 L43 35 L21 35 Z" fill="#E0A458"/>
    <!-- Joint lines -->
    <g stroke="#1E2A4A" stroke-width="1.4" stroke-linecap="round" opacity="0.55">
      <line x1="29.7" y1="22" x2="28.6" y2="35"/>
      <line x1="34.3" y1="22" x2="35.4" y2="35"/>
    </g>
    <!-- Arch opening -->
    <path d="M16 52 L16 41 A16 16 0 0 1 48 41 L48 52" fill="none" stroke="#2B3A67" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Wordmark -->
  <text x="104" y="58" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="600" letter-spacing="0.5" fill="#2B3A67">Keystone</text>
</svg>
