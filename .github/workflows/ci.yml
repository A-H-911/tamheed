name: CI

# Deterministic, fail-closed gate for every push to main and every PR (plan 013/B10).
# Job 1 runs EXACTLY `python check.py` — the same one command contributors run
# locally, so "passes locally != passes CI" cannot happen. check.py owns the gate
# list (suites, v1 goldens, structure lint, canonical form, eval-runner sample);
# anything deterministic goes there, never here. All checks are stdlib (D-U3).
# Python floor is 3.10 per ASM-D (the MCP SDK's requires-python; 3.9 dropped —
# see CHANGELOG).

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: check (py${{ matrix.python }} · ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: The one command
        shell: bash
        run: python check.py

  server-smoke:
    # The uv/PEP 723 launch path is the documented install story — smoke it.
    # Infra-tolerant: if uv cannot be provisioned, SKIP with a visible notice;
    # never fail the pipeline on runner infrastructure.
    name: MCP server smoke (uv / PEP 723)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Server selftest via uv
        shell: bash
        run: |
          if ! command -v uv >/dev/null 2>&1; then
            curl -LsSf https://astral.sh/uv/install.sh | sh || true
            export PATH="$HOME/.local/bin:$PATH"
          fi
          if command -v uv >/dev/null 2>&1; then
            uv run plugins/tamheed/server/tamheed_server.py --selftest
          else
            echo "::notice::uv unavailable on this runner — server smoke SKIPPED (infra, not a failure)"
          fi
